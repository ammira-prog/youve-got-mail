<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kawaii Mail 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'Quicksand', sans-serif;
  background: linear-gradient(135deg, #d8b4fe, #fbcfe8, #fde68a);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* 🌸 AVATAR SCREEN */
.avatar-screen {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.25);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* 🐱 AVATARS */
.avatar {
  width: 340px;
  height: 340px;
  object-fit: contain;
  border-radius: 20px;
}

/* 💌 TEXT */
.mail-text {
  margin-top: 18px;
  font-size: 36px;
  font-weight: 600;
  color: white;
  text-align: center;
  text-shadow: 0 0 12px rgba(255,255,255,0.6);
}

/* 💖 HEART BUTTON */
.heart-btn {
  margin-top: 18px;
  font-size: 44px;
  cursor: pointer;
  animation: pulse 1.2s infinite;
  user-select: none;
}

@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.25); }
}

/* 💌 ENVELOPE */
.envelope {
  width: 360px;
  height: 230px;
  background: #ffe4f2;
  position: relative;
  border-radius: 18px;
  box-shadow: 0 0 30px rgba(236,72,153,0.25), 0 15px 40px rgba(0,0,0,0.25);
  cursor: pointer;
  display: none;
}

.flap {
  position: absolute;
  border-left: 180px solid transparent;
  border-right: 180px solid transparent;
  border-top: 130px solid #f9a8d4;
  transform-origin: top;
}

/* 📜 LETTER */
.letter {
  position: absolute;
  top: 15px;
  left: 15px;
  right: 15px;
  bottom: 15px;
  background: #fffafc;
  border-radius: 12px;
  padding: 16px;
  display: none;
  color: #7c3aed;
}

/* 🌯 CLOSE BUTTON */
.close-btn {
  margin-top: 18px;
  padding: 14px 22px;
  border-radius: 999px;
  border: none;
  font-family: 'Quicksand', sans-serif;
  font-size: 16px;
  cursor: pointer;
  background: linear-gradient(135deg, #fbcfe8, #d8b4fe);
  color: white;
}
</style>
</head>

<body>

<!-- 🐱 AVATAR SCREEN -->
<div class="avatar-screen" id="avatarScreen">
  <img class="avatar" id="avatarImg" src="assets/mail.png">

  <div class="mail-text" id="avatarText">
    you’ve got mail 💌
  </div>

  <div class="heart-btn" onclick="startApp()">💖</div>
</div>

<!-- 💌 ENVELOPE -->
<div class="envelope" id="env" onclick="openLetter()">
  <div class="flap"></div>

  <div class="letter" id="letter">
    <div id="text"></div>

    <button class="close-btn" onclick="closeLetter(event)">
      🌯 burrito close
    </button>
  </div>
</div>

<!-- 🎵 AUDIO -->
<audio id="bgm" loop>
  <source src="assets/bgm.mp3" type="audio/mpeg">
</audio>

<script>

const message =
`good morning, babe~ 🔆
it's friyey! just a few
hrs away from weekend~
slay the day like you always do!
take care, you've been living in
my mind, rent free~ 🫶🏻`;

let i = 0;

function startApp() {
  document.getElementById("avatarScreen").style.display = "none";
  document.getElementById("env").style.display = "block";

  const bgm = document.getElementById("bgm");
  bgm.volume = 0.3;
  bgm.play().catch(() => {});
}

function openLetter() {
  const env = document.getElementById("env");
  document.getElementById("letter").style.display = "block";
  typeWriter();
}

function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 45);
  }
}

/* 💖 ONLY FIX APPLIED HERE */
function closeLetter(e) {
  e.stopPropagation();

  document.getElementById("env").style.display = "none";
  document.getElementById("letter").style.display = "none";
  document.getElementById("text").innerHTML = "";
  i = 0;

  document.getElementById("avatarImg").src = "assets/annoy.png";

  /* ✅ FIX: ensure correct text matches annoy avatar */
  document.getElementById("avatarText").innerText = "annoy you later~ 😼";

  document.getElementById("avatarScreen").style.display = "flex";
}

</script>

</body>
</html>
